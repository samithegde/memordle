<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/memordle-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memordle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@300;700;900&display=swap" rel="stylesheet">
    <meta name="google-site-verification" content="okSt1r6HDRi0MstlOTm2LvISUe1NUy6nEC79KXXXmn8" />
    <div id="app">
  </head>
  <body>
      <header>
        <div class="header-inner">
          <div class="logo-wrap">
            <img src="/memordle-logo.png" alt="Memordle" class="logo-img" />
            <p class="subtitle">By Samit Hegde</p>
          </div>
          <button id="new-game">NEW GAME</button>
        </div>
        <p class="subtitle">Colours flash for half a second, then vanish into memory.</p>
      </header>

      <div id="message"></div>
      <div id="answer-reveal"></div>

      <main>
        <div id="grid"></div>
        <div id="keyboard"></div>
      </main>

      <div class="legend">
        <div class="legend-item"><span class="legend-tile correct">A</span><span>Correct place</span></div>
        <div class="legend-item"><span class="legend-tile present">A</span><span>Wrong place</span></div>
        <div class="legend-item"><span class="legend-tile ghost-demo">A</span><span>Ghosted</span></div>
      </div>

      <div id="share-popup" style="display:none; position:fixed; left:0; top:0; width:100vw; height:100vh; background:rgba(0,0,0,0.18); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:#fff; color:#222; border-radius:8px; box-shadow:0 2px 16px 0 rgba(0,0,0,0.13); padding:32px 24px; min-width:280px; max-width:90vw; text-align:center;">
          <div style="font-size:1.2rem; font-weight:700; margin-bottom:12px;">Share your result!</div>
          <textarea id="share-text" readonly style="width:100%; min-height:60px; font-size:1rem; margin-bottom:16px; border-radius:4px; border:1px solid #ccc; padding:8px;"></textarea>
          <div style="display:flex; gap:10px; justify-content:center;">
            <button id="copy-share" style="font-size:1rem; padding:7px 18px; border-radius:4px; border:1px solid #2a7a2a; background:#2a7a2a; color:#fff; cursor:pointer;">Copy</button>
            <button id="close-share" style="font-size:1rem; padding:7px 18px; border-radius:4px; border:1px solid #ccc; background:#eee; color:#222; cursor:pointer;">Close</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
